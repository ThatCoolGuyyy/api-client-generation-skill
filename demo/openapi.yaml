openapi: 3.1.0
info:
  title: Notes API
  version: 1.0.0
servers:
  - url: https://api.example.test/v1
paths:
  /notes:
    get:
      operationId: listNotes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: A page of notes
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Note" }
                  next_cursor:
                    type: [string, "null"]
        "401": { $ref: "#/components/responses/ApiError" }
        "422": { $ref: "#/components/responses/ApiError" }
        "429": { $ref: "#/components/responses/ApiError" }
        "503": { $ref: "#/components/responses/ApiError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Note:
      type: object
      required: [id, title, updated_at]
      properties:
        id: { type: string }
        title: { type: string }
        updated_at: { type: string, format: date-time }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
            request_id: { type: string }
  responses:
    ApiError:
      description: Structured API error
      headers:
        Retry-After:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

